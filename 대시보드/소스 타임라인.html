<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>임팩트 타임라인</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#fcfcfb; --panel:#ffffff; --ink:#191d24; --sub:#6e7686; --faint:#9aa1af;
  --hair:#ebedf0; --hair2:#f4f5f7;
  --accent:#2f5fe0; --accent-soft:#eef3fe;
  --up:#177245; --dn:#c4322e; --fl:#8a919e;
  --up-soft:#f0f7f2; --dn-soft:#fbf1f0;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;
  font-family:"Pretendard Variable",Pretendard,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  font-feature-settings:"tnum";-webkit-font-smoothing:antialiased}
a{color:inherit}

header{padding:20px 28px 0;background:var(--bg);flex:0 0 auto}
.brand{display:flex;align-items:baseline;gap:12px;margin-bottom:2px}
h1{margin:0;font-size:21px;font-weight:800;letter-spacing:-.5px}
.stamp{font-size:11px;color:var(--faint);letter-spacing:.02em}
.kicker{font-size:10.5px;font-weight:700;color:var(--faint);letter-spacing:.14em;text-transform:uppercase;margin:0 0 6px}

/* 브리핑 */
#brief{padding:14px 28px 16px;border-bottom:1px solid var(--hair)}
#brief .row{display:flex;gap:28px;flex-wrap:wrap}
.bi{flex:1;min-width:250px;max-width:420px;padding:2px 0;cursor:pointer;border-left:2px solid transparent}
.bi:hover .bt{color:var(--accent)}
.bi .bd{font-size:11px;color:var(--faint);margin-bottom:3px;display:flex;gap:8px;align-items:baseline}
.bi .bt{font-size:13px;font-weight:650;line-height:1.45;letter-spacing:-.2px}
.bi .bw{font-size:12px;color:var(--sub);margin-top:2px;line-height:1.4}
.dirg{font-weight:800}
.dirg.up{color:var(--up)} .dirg.dn{color:var(--dn)} .dirg.fl{color:var(--fl)}

/* 컨트롤 */
.controls{display:flex;gap:10px;align-items:center;padding:10px 28px;border-bottom:1px solid var(--hair);background:var(--panel)}
.seg{display:flex;border:1px solid var(--hair);border-radius:8px;overflow:hidden}
.seg span{padding:4px 12px;font-size:12px;color:var(--sub);cursor:pointer;user-select:none}
.seg span.on{background:var(--ink);color:#fff}
input#q{border:none;border-bottom:1px solid transparent;background:transparent;padding:5px 2px;font-size:12.5px;width:210px;outline:none;font-family:inherit}
input#q:focus{border-bottom-color:var(--accent)}
input#q::placeholder{color:var(--faint)}
.count-note{font-size:11px;color:var(--faint);margin-left:auto;font-variant-numeric:tabular-nums}

#main{flex:1;display:flex;overflow:hidden}

/* 시그널 보드 */
#ents{flex:0 0 296px;overflow-y:auto;border-right:1px solid var(--hair);background:var(--panel);padding:10px 0 30px}
.ehead{display:grid;grid-template-columns:1fr 64px 58px;padding:4px 18px 8px;font-size:10px;color:var(--faint);
  letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.ent{display:grid;grid-template-columns:1fr 64px 58px;align-items:center;padding:7px 18px;cursor:pointer;
  border-left:2px solid transparent}
.ent:hover{background:var(--hair2)}
.ent.sel{border-left-color:var(--ink);background:var(--hair2)}
.ent b{font-size:13px;font-weight:650;letter-spacing:-.2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ghead{display:flex;gap:6px;align-items:baseline;padding:14px 18px 5px;font-size:10px;font-weight:800;color:var(--faint);
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;user-select:none;border-bottom:1px solid var(--hair2)}
.ghead:hover{color:var(--sub)}
.ghead .tri{font-size:9px;width:10px}
.ghead .gn{margin-left:auto;font-weight:600;font-variant-numeric:tabular-nums}
.spark{display:flex;gap:3px;align-items:center}
.spark i{width:6px;height:6px;border-radius:50%;background:var(--hair)}
.spark i.up{background:var(--up)} .spark i.dn{background:var(--dn)} .spark i.fl{background:#c3c9d3}
.net{font-size:12px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.net.up{color:var(--up)} .net.dn{color:var(--dn)} .net.fl{color:var(--faint)}

#view{flex:1;overflow-y:auto;padding:18px 34px 60px}
.vhead{margin:0 0 4px;font-size:17px;font-weight:800;letter-spacing:-.4px}
.vmeta{font-size:12px;color:var(--sub);margin-bottom:18px}
.vmeta .dirg{margin-right:2px}
#backTop{display:none;font-size:12px;color:var(--accent);cursor:pointer;font-weight:650;margin-bottom:10px}
body.detail #backTop{display:inline-block}

/* 날짜 그룹 + 이벤트 행 */
.dgroup{margin:0 0 6px}
.dhead{position:sticky;top:0;background:var(--bg);padding:10px 0 6px;font-size:11px;font-weight:700;color:var(--faint);
  letter-spacing:.08em;border-bottom:1px solid var(--hair);z-index:2}
.erow{border-bottom:1px solid var(--hair2);padding:10px 2px 10px;max-width:840px}
.erow .top{display:flex;gap:10px;align-items:flex-start;cursor:pointer}
.erow .src{flex:0 0 26px;padding-top:3px;line-height:0}
.erow .src svg{width:15px;height:15px;border-radius:3px}
.erow .lbl{font-size:13.5px;font-weight:560;line-height:1.55;letter-spacing:-.15px;flex:1}
.erow .glyphs{flex:0 0 auto;font-size:12px;font-weight:800;padding-top:2px;white-space:nowrap}
.erow .glyphs .n{color:var(--faint);font-weight:600;font-size:11px;margin-left:5px}
.erow a.orig{font-size:11px;color:var(--faint);text-decoration:none;flex:0 0 auto;padding-top:3px}
.erow a.orig:hover{color:var(--accent)}
.erow .lbl:hover{color:var(--accent)}

.tree{margin:8px 0 2px 44px;display:none}
.erow.open .tree{display:block}
.br{position:relative;padding-left:16px;margin-top:5px;border-left:2px solid var(--hair)}
.node{display:flex;gap:8px;align-items:baseline;font-size:12.5px;line-height:1.5;padding:2px 0}
.node .tag{font-weight:750;white-space:nowrap;cursor:pointer;letter-spacing:-.1px}
.node .tag:hover{text-decoration:underline}
.node.up .tag{color:var(--up)} .node.dn .tag{color:var(--dn)} .node.fl .tag{color:var(--fl)}
.node .why{color:var(--sub)}
.node .imp3{font-size:9px;color:#8a6100;background:#faf3dd;border-radius:4px;padding:1px 6px;font-weight:800;letter-spacing:.04em}
.node.hitn .tag{background:var(--accent-soft);border-radius:4px;padding:0 4px}
.kids{margin-left:14px}

/* 엔티티 요약 스트립 */
.esum{display:flex;gap:26px;padding:12px 0 14px;border-bottom:1px solid var(--hair);margin-bottom:6px;max-width:840px}
.esum .cell .v{font-size:19px;font-weight:800;letter-spacing:-.4px;font-variant-numeric:tabular-nums}
.esum .cell .l{font-size:10px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-top:1px}
.esum .v.up{color:var(--up)} .esum .v.dn{color:var(--dn)}
.esum .latest{flex:1;min-width:0;align-self:center;font-size:12.5px;color:var(--sub);line-height:1.5}
.esum .latest b{color:var(--ink)}

.empty{color:var(--faint);font-size:12.5px;padding:40px;text-align:center}

@media (max-width:700px){
  header,#brief{padding-left:16px;padding-right:16px}
  .controls{padding:8px 16px;flex-wrap:wrap}
  #main{flex-direction:column}
  #ents{flex:0 0 auto;max-height:38vh;border-right:none;border-bottom:1px solid var(--hair)}
  body.detail #ents{display:none}
  #view{padding:12px 16px 50px}
  input#q{width:130px}
}
</style>
</head>
<body>
<header>
  <div class="brand"><h1>임팩트 타임라인</h1><span class="stamp" id="stamp"></span></div>
</header>
<div id="brief"></div>
<div class="controls">
  <div class="seg" id="dirseg">
    <span class="on" data-d="+">호재</span><span class="on" data-d="-">악재</span><span data-d="0">중립</span>
  </div>
  <div class="seg"><span id="majorOnly">주요만</span></div>
  <input id="q" placeholder="검색 — 키워드, 회사">
  <span class="count-note" id="cnt"></span>
</div>
<div id="main">
  <div id="ents"></div>
  <div id="view"></div>
</div>

const cls=d=>d==='+'?'up':d==='-'?'dn':'fl';
const sym=d=>d==='+'?'▲':d==='-'?'▼':'◆';
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const byId={};EVENTS.forEach(e=>byId[e.idx]=e);
const DOW=['일','월','화','수','목','금','토'];

const ents={};
function walk(idx,bs,depth){bs.forEach(b=>{(ents[b.t]=ents[b.t]||[]).push({idx,d:b.d,w:b.w,m:b.m});walk(idx,b.k||[],depth+1);});}
Object.entries(IMPACTS).forEach(([i,b])=>walk(+i,b,0));
Object.values(ents).forEach(a=>a.sort((x,y)=>byId[x.idx].date<byId[y.idx].date?-1:1));

const maxDate=EVENTS.map(e=>e.date).sort().at(-1);
const cutoff=new Date(maxDate.slice(0,10));cutoff.setDate(cutoff.getDate()-13);
const recentK=cutoff.toISOString().slice(0,10);
/* 정렬: 최근 14일 활동 많은 순 → 전체 건수 */
const entOrder=Object.keys(ents).sort((a,b)=>{
  const ra=ents[a].filter(x=>byId[x.idx].date>=recentK).length, rb=ents[b].filter(x=>byId[x.idx].date>=recentK).length;
  return rb-ra||ents[b].length-ents[a].length;
});

const state={sel:null,dir:new Set(['+','-']),major:false,q:''};
document.querySelectorAll('#dirseg span').forEach(el=>{
  el.onclick=()=>{const d=el.dataset.d;state.dir.has(d)?state.dir.delete(d):state.dir.add(d);el.classList.toggle('on');render();};
});
document.getElementById('majorOnly').onclick=function(){state.major=!state.major;this.classList.toggle('on');render();};
document.getElementById('q').oninput=e=>{state.q=e.target.value.trim().toLowerCase();render();};

function evMatch(e){if(!state.q)return true;
  return (e.label.toLowerCase()+JSON.stringify(IMPACTS[e.idx]||[]).toLowerCase()).includes(state.q);}
function brShow(b){
  if(!state.dir.has(b.d)&&!(b.k||[]).some(brShow))return false;
  if(state.major&&b.m<3&&!(b.k||[]).some(brShow))return false;
  return true;}

/* ---- 브리핑: 최근 7일 주요(m3) + 반전 ---- */
function brief(){
  const wk=new Date(maxDate.slice(0,10));wk.setDate(wk.getDate()-6);
  const wkK=wk.toISOString().slice(0,10);
  const items=[];
  EVENTS.filter(e=>e.date>=wkK).forEach(e=>{
    (IMPACTS[e.idx]||[]).forEach(function f(b){
      if(b.m>=3)items.push({e,b});(b.k||[]).forEach(f);
    });
  });
  /* 반전: 엔티티 최신 방향 ≠ 직전 방향 */
  const flips=[];
  Object.entries(ents).forEach(([t,a])=>{
    if(a.length<2)return;
    const last=a.at(-1),prev=a.at(-2);
    if(byId[last.idx].date>=wkK&&last.d!==prev.d&&last.d!=='0'&&prev.d!=='0')
      flips.push({t,last,prev});
  });
  let h='<div class="kicker">이번 주 시그널</div><div class="row">';
  items.slice(0,3).forEach(({e,b})=>{
    h+=`<div class="bi" data-i="${e.idx}"><div class="bd"><span>${e.date.slice(5,10)}</span><span class="dirg ${cls(b.d)}">${sym(b.d)} ${esc(b.t)}</span></div>
      <div class="bt">${esc(e.label.slice(0,72))}${e.label.length>72?'…':''}</div><div class="bw">${esc(b.w)}</div></div>`;
  });
  flips.slice(0,2).forEach(({t,last,prev})=>{
    h+=`<div class="bi" data-e="${esc(t)}"><div class="bd"><span>방향 반전</span></div>
      <div class="bt"><span class="dirg ${cls(prev.d)}">${sym(prev.d)}</span> → <span class="dirg ${cls(last.d)}">${sym(last.d)}</span> ${esc(t)}</div>
      <div class="bw">${esc(last.w)}</div></div>`;
  });
  document.getElementById('brief').innerHTML=h+'</div>';
  document.querySelectorAll('.bi[data-i]').forEach(el=>el.onclick=()=>{state.sel=null;render();
    setTimeout(()=>{const r=document.querySelector(`.erow[data-i="${el.dataset.i}"]`);
      if(r){r.classList.add('open');r.scrollIntoView({block:'center'});}},0);});
  document.querySelectorAll('.bi[data-e]').forEach(el=>el.onclick=()=>selectEnt(el.dataset.e));
}

 ['파운드리·장비·소재',['TSMC','SMIC','Naura','AMAT·TEL','Axcelis·Veeco','Advantest','Teradyne','반도체 장비 업체','웨이퍼 업체(SUMCO·실트로닉)','포토레지스트·소재 업체','OSAT(Amkor·ASE)','OSAT·패키징','ABF 서브스트레이트 업체','TechInsights']],
];
const G_ETC='기타';
const groupOf={};GROUPS.forEach(([g,list])=>list.forEach(t=>groupOf[t]=g));
const gCollapsed=new Set([G_ETC]);
function entRow(t){
  const a=ents[t];const net=a.reduce((s,x)=>s+(x.d==='+'?1:x.d==='-'?-1:0),0);
  const nc=net>0?'up':net<0?'dn':'fl';
  return `<div class="ent${t===state.sel?' sel':''}" data-e="${esc(t)}"><b>${esc(t)}</b>${sparkHtml(a)}
    <span class="net ${nc}">${net>0?'+':''}${net}</span></div>`;
}
function renderEnts(){
  let h='<div class="ehead"><span>엔티티</span><span>최근</span><span style="text-align:right">순방향</span></div>';
  const names=[...GROUPS.map(g=>g[0]),G_ETC];
  names.forEach(g=>{
    const members=entOrder.filter(t=>(groupOf[t]||G_ETC)===g);
    if(!members.length)return;
    const closed=gCollapsed.has(g);
    h+=`<div class="ghead${closed?' closed':''}" data-g="${esc(g)}"><span class="tri">${closed?'▸':'▾'}</span>${esc(g)}<span class="gn">${members.length}</span></div>`;
    if(!closed)h+=members.map(entRow).join('');
  });
  document.getElementById('ents').innerHTML=h;
  document.querySelectorAll('.ent').forEach(el=>el.onclick=()=>selectEnt(el.dataset.e));
  document.querySelectorAll('.ghead').forEach(el=>el.onclick=()=>{
    const g=el.dataset.g;gCollapsed.has(g)?gCollapsed.delete(g):gCollapsed.add(g);renderEnts();});
}
function selectEnt(t){state.sel=t;document.body.classList.add('detail');render();document.getElementById('view').scrollTop=0;}

function nodeHtml(b,hit){
  let h=`<div class="node ${cls(b.d)}"><span class="tag${hit===b.t?' hitn':''}" data-e="${esc(b.t)}">${sym(b.d)} ${esc(b.t)}</span>
    <span class="why">${esc(b.w)}</span>${b.m>=3?'<span class="imp3">주요</span>':''}</div>`;
  const kids=(b.k||[]).filter(brShow).map(c=>nodeHtml(c,hit)).join('');
  return h+(kids?`<div class="kids">${kids}</div>`:'');
}
function rowHtml(e,hit,forceOpen){
  const bs=(IMPACTS[e.idx]||[]).filter(brShow);
  const glyphs=bs.map(b=>`<span class="dirg ${cls(b.d)}">${sym(b.d)}</span>`).slice(0,4).join('');
  const hasMajor=JSON.stringify(IMPACTS[e.idx]||[]).includes('"m":3');
  const open=forceOpen||hasMajor?' open':'';
  const tree=bs.map(b=>`<div class="br">${nodeHtml(b,hit)}</div>`).join('');
  return `<div class="erow${open}" data-i="${e.idx}">
    <div class="top"><span class="src ${e.src}">${SRC[e.src]}</span>
      <span class="lbl">${esc(e.label)}</span>
      <span class="glyphs">${glyphs}<span class="n">${bs.length||''}</span></span>
      <a class="orig" href="${esc(e.url)}" target="_blank" rel="noopener">↗</a></div>
    ${tree?`<div class="tree">${tree}</div>`:''}</div>`;
}
function bindRows(){
  document.querySelectorAll('.erow .top').forEach(el=>el.onclick=ev=>{
    if(ev.target.closest('a'))return;
    el.parentElement.classList.toggle('open');});
  document.querySelectorAll('.node .tag').forEach(el=>el.onclick=ev=>{ev.stopPropagation();selectEnt(el.dataset.e);});
}
function groupByDate(list,hit,forceOpen){
  let h='',cur='';
  list.forEach(e=>{
    const d=e.date.slice(0,10);
    if(d!==cur){if(cur)h+='</div>';cur=d;
      const dt=new Date(d);
      h+=`<div class="dgroup"><div class="dhead">${d.slice(5).replace('-','.')} ${DOW[dt.getDay()]}</div>`;}
    h+=rowHtml(e,hit,forceOpen);
  });
  return h+(cur?'</div>':'');
}
function render(){
  renderEnts();
  const v=document.getElementById('view');
  let back='<span id="backTop">‹ 전체 피드</span>';
  if(state.sel){
    const all=ents[state.sel];
    const shown=[...new Set(all.filter(x=>state.dir.has(x.d)&&(!state.major||x.m>=3)).map(x=>x.idx))]
      .map(i=>byId[i]).filter(evMatch).sort((a,b)=>a.date<b.date?1:-1);
    let u=0,d=0;all.forEach(x=>x.d==='+'?u++:x.d==='-'?d++:0);
    const last=all.at(-1);
    v.innerHTML=back+`<div class="vhead">${esc(state.sel)}</div>
      <div class="esum">
        <div class="cell"><div class="v up">${u}</div><div class="l">호재</div></div>
        <div class="cell"><div class="v dn">${d}</div><div class="l">악재</div></div>
        <div class="cell"><div class="v">${all.length}</div><div class="l">이벤트</div></div>
        <div class="latest">최신 <b>${byId[last.idx].date.slice(5,10)}</b> <span class="dirg ${cls(last.d)}">${sym(last.d)}</span> ${esc(last.w)}</div>
      </div>`+ (groupByDate(shown,state.sel,true)||'<div class="empty">조건에 맞는 이벤트 없음</div>');
    document.getElementById('cnt').textContent=`${shown.length}건`;
  } else {
    const feed=EVENTS.filter(e=>(IMPACTS[e.idx]||[]).some(brShow)&&evMatch(e)).sort((a,b)=>a.date<b.date?1:-1);
    v.innerHTML=`<div class="vhead" style="display:none"></div>`+groupByDate(feed,null,false);
    document.getElementById('cnt').textContent=`${feed.length}건`;
  }
  const bt=document.getElementById('backTop');
  if(bt)bt.onclick=()=>{state.sel=null;document.body.classList.remove('detail');render();};
  bindRows();
}
document.getElementById('stamp').textContent=`${maxDate.slice(0,10)} 기준 · 평가 ${Object.keys(IMPACTS).length}건`;
brief();render();
</script>
</body>
</html>
