  .stage{position:relative; flex:1; min-height:0; border-top:1px solid var(--line);}
  canvas{display:block; width:100%; height:100%; touch-action:none; cursor:grab;}

  .hint{position:absolute; left:50%; bottom:10px; transform:translateX(-50%); color:var(--sub); font-size:.7rem;

  .tip .tm{color:var(--sub); font-size:.7rem; margin-top:2px;}
  .panel{position:absolute; top:12px; right:12px; width:300px; max-width:calc(100% - 24px); max-height:calc(100% - 24px);
    overflow-y:auto; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px;
    box-shadow:0 8px 24px rgba(0,0,0,.14); display:none; z-index:9;}
  .panel.open{display:block;}
  @media (max-width:560px){
    .panel{top:auto; right:0; left:0; bottom:0; width:100%; max-width:100%; max-height:52%;
      border-radius:14px 14px 0 0; border-bottom:none;}
  }

  .panel .ptype{display:inline-flex; align-items:center; gap:5px; font-size:.68rem; font-weight:700;
    border-radius:6px; padding:2px 8px 2px 5px; margin-bottom:8px;}
  .panel .ptype svg{width:13px; height:13px; display:block; border-radius:3px;}
  .panel .ptype.newsletter{background:var(--nl-soft); color:var(--nl);}
  .panel .ptype.linkedin{background:var(--li-soft); color:var(--li);}
  .panel .ptype.youtube{background:var(--yt-soft); color:var(--yt);}

  .panel .meta{color:var(--sub); font-size:.72rem; font-variant-numeric:tabular-nums;}
  .panel .cat{display:inline-block; font-size:.68rem; font-weight:700; background:var(--accent-soft); color:var(--accent);

  .panel a.open-link{display:inline-block; margin-top:10px; font-size:.78rem; font-weight:700; color:var(--accent);
    background:var(--accent-soft); border-radius:8px; padding:5px 12px; text-decoration:none;}
  .panel h3{font-size:.7rem; text-transform:uppercase; letter-spacing:.08em; color:var(--sub); margin:14px 0 6px; font-weight:700;}
  .panel ul{list-style:none; margin:0; padding:0;}
  .panel li{border-top:1px solid var(--line); padding:6px 0;}
  .panel li:first-child{border-top:none; padding-top:0;}
  .panel li button{display:flex; gap:7px; align-items:flex-start; width:100%; text-align:left; border:none; background:none;

  .panel li button:hover{color:var(--accent);}
  .panel li button:focus-visible{outline:2px solid var(--accent); outline-offset:1px; border-radius:4px;}
  .panel li svg{flex:none; width:13px; height:13px; margin-top:2px; border-radius:3px;}
  .panel .none{color:var(--sub); font-size:.75rem;}
</style>

/* ---------- constants & helpers ---------- */
const TYPE_LABEL = { newsletter:"뉴스레터", linkedin:"LinkedIn 신호", youtube:"YouTube 영상" };

  ["compute","컴퓨트"],["memory","메모리"],["power","전력"],["cooling","냉각"],
  ["business","AI 비즈니스"],["models","AI 모델"],["semis","반도체"],["robotics","로보틱스"]

/* 인텔리전스 대시보드의 인라인 SVG 3종 재사용 (fill만 테마 토큰으로 치환) */

};
const typeColor = t => css(t==="newsletter" ? "--nl" : t==="linkedin" ? "--li" : "--yt");

/* 캔버스용 아이콘 이미지 (테마 바뀌면 재생성) */
const iconImg = {};

/* ---------- graph model ---------- */
const nodes = DATA.nodes.map(n => ({...n, x:0, y:0, vx:0, vy:0, deg:0, fixed:false}));
const byId = new Map(nodes.map(n => [n.id, n]));
const edges = DATA.edges.filter(e => byId.has(e.source) && byId.has(e.target))
  .map(e => ({a: byId.get(e.source), b: byId.get(e.target)}));
for (const e of edges){ e.a.deg++; e.b.deg++; }
const nbr = new Map(nodes.map(n => [n.id, new Set()]));
for (const e of edges){ nbr.get(e.a.id).add(e.b.id); nbr.get(e.b.id).add(e.a.id); }

/* 신호 노드가 물려받는 카테고리(필터용): 연결된 뉴스레터들의 카테고리 합집합 */
for (const n of nodes){
  n.cats = new Set(n.category ? [n.category] : []);
}
for (const e of edges){
  const nl = e.a.type==="newsletter" ? e.a : e.b.type==="newsletter" ? e.b : null;
  if (!nl || !nl.category) continue;
  const sig = nl===e.a ? e.b : e.a;
  sig.cats.add(nl.category);
}
const radius = n => n.type==="newsletter" ? Math.min(9 + n.deg*1.3, 17) : (n.deg ? 7.5 : 6);

/* ---------- initial layout: 카테고리별 방사 배치 ---------- */
const catAngle = {};
CATS.forEach(([k], i) => catAngle[k] = (i / CATS.length) * Math.PI * 2 - Math.PI/2);
function seed(){
  let j = 0;
  for (const n of nodes){
    let a, r;
    const first = [...n.cats][0];
    if (first !== undefined){
      a = catAngle[first] + (Math.random()-.5)*.7;
      r = n.type==="newsletter" ? 170 + Math.random()*60 : 240 + Math.random()*80;
    } else {
      a = (j*2.399963) % (Math.PI*2);       /* golden-angle scatter for isolated nodes */
      r = 330 + (j%5)*22;
    }
    n.x = Math.cos(a)*r; n.y = Math.sin(a)*r; j++;
  }
}
seed();

/* ---------- force simulation (vanilla) ---------- */
let alpha = 1;
function tick(){
  const REP = 7000, SPRING = .04, REST = 130, CENTER = .008, CATG = .009;
  for (let i=0;i<nodes.length;i++){
    const a = nodes[i];
    for (let k=i+1;k<nodes.length;k++){
      const b = nodes[k];
      let dx = a.x-b.x, dy = a.y-b.y;
      let d2 = dx*dx+dy*dy;
      if (d2 < 1) { dx = Math.random()-.5; dy = Math.random()-.5; d2 = 1; }
      if (d2 > 160000) continue;
      const mult = (a.type==="newsletter" && b.type==="newsletter") ? 3 : 1;
      const f = REP * mult / d2 * alpha;
      const d = Math.sqrt(d2), fx = dx/d*f, fy = dy/d*f;
      a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
    }
  }
  for (const e of edges){
    const dx = e.b.x-e.a.x, dy = e.b.y-e.a.y;
    const d = Math.max(Math.hypot(dx,dy), .01);
    const f = (d-REST)*SPRING*alpha, fx = dx/d*f, fy = dy/d*f;
    e.a.vx += fx; e.a.vy += fy; e.b.vx -= fx; e.b.vy -= fy;
  }
  for (const n of nodes){
    n.vx -= n.x*CENTER*alpha; n.vy -= n.y*CENTER*alpha;
    if (n.type==="newsletter" && n.category){
      const gx = Math.cos(catAngle[n.category])*240, gy = Math.sin(catAngle[n.category])*240;
      n.vx += (gx-n.x)*CATG*alpha; n.vy += (gy-n.y)*CATG*alpha;
    }
    if (!n.fixed){ n.x += n.vx; n.y += n.vy; }
    n.vx *= .82; n.vy *= .82;
  }
  /* 충돌 분리: 라벨 겹침 방지용 최소 간격 확보 */
  for (let i=0;i<nodes.length;i++){
    const a = nodes[i];
    for (let k=i+1;k<nodes.length;k++){
      const b = nodes[k];
      const min = radius(a) + radius(b) + ((a.type==="newsletter" && b.type==="newsletter") ? 52 : 20);
      let dx = b.x-a.x, dy = b.y-a.y;
      const d = Math.hypot(dx,dy);
      if (d >= min || d === 0) continue;
      const push = (min-d)/d*.5;
      dx *= push; dy *= push;
      if (!a.fixed){ a.x -= dx; a.y -= dy; }
      if (!b.fixed){ b.x += dx; b.y += dy; }
    }
  }
  alpha = Math.max(alpha*.992, 0);
}
function reheat(v){ alpha = Math.max(alpha, v); }

/* ---------- canvas & camera ---------- */
const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
const stage = document.getElementById("stage");
let W = 0, H = 0, DPR = 1;
const cam = { x:0, y:0, s:1 };
function resize(){
  DPR = Math.min(devicePixelRatio || 1, 2);
  W = stage.clientWidth; H = stage.clientHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  fitInitial();
  draw();
}
let fitted = false;
function fitInitial(){
  if (fitted || !nodes.length) return;
  cam.s = Math.min(W, H) / 1050;
  cam.s = Math.max(.3, Math.min(cam.s, 1));
  fitted = true;
}
const toScreen = (x,y) => [ (x - cam.x)*cam.s + W/2, (y - cam.y)*cam.s + H/2 ];
const toWorld  = (px,py) => [ (px - W/2)/cam.s + cam.x, (py - H/2)/cam.s + cam.y ];

/* ---------- state ---------- */
let activeCat = null;       /* 필터 */
let hoverN = null, selN = null;

function nodeOn(n){         /* 필터 통과 여부 */
  if (!activeCat) return true;
  return n.cats.has(activeCat);
}
function nodeAlpha(n){
  let a = nodeOn(n) ? 1 : .13;
  if (selN){
    const near = n===selN || nbr.get(selN.id).has(n.id);
    a = Math.min(a, near ? 1 : .13);
    if (near && nodeOn(n)) a = 1;
  }
  return a;
}

/* ---------- draw ---------- */
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  const lineC = css("--line"), subC = css("--sub"), inkC = css("--ink"), accC = css("--accent");

  /* edges */
  for (const e of edges){
    const aOK = nodeAlpha(e.a), bOK = nodeAlpha(e.b);
    const hi = selN && (e.a===selN || e.b===selN);
    const hov = hoverN && (e.a===hoverN || e.b===hoverN);
    ctx.globalAlpha = Math.min(aOK, bOK) * (hi||hov ? 1 : .8);
    ctx.strokeStyle = (hi||hov) ? accC : lineC;
    ctx.lineWidth = (hi||hov) ? 1.8 : 1.1;
    const [x1,y1] = toScreen(e.a.x, e.a.y), [x2,y2] = toScreen(e.b.x, e.b.y);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }

  /* nodes: 대시보드 SVG 아이콘 배지를 노드 그 자체로 렌더 */
  const showNL = cam.s > .5, showSig = cam.s > 1.05;
  for (const n of nodes){
    const [x,y] = toScreen(n.x, n.y);
    if (x < -40 || y < -40 || x > W+40 || y > H+40) continue;
    const r = radius(n) * cam.s * (n===hoverN || n===selN ? 1.25 : 1);
    const al = nodeAlpha(n);
    ctx.globalAlpha = al;
    if (n===selN || n===hoverN){
      ctx.beginPath(); ctx.arc(x, y, r+4, 0, Math.PI*2);
      ctx.strokeStyle = accC; ctx.lineWidth = 2; ctx.stroke();
    }
    const img = iconImg[n.type];
    if (img && img.complete && img.naturalWidth){
      ctx.drawImage(img, x-r, y-r, r*2, r*2);
    } else {
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fillStyle = typeColor(n.type); ctx.fill();
    }
    const labelOn = n===hoverN || n===selN || (n.type==="newsletter" ? showNL : showSig);
    if (labelOn && al > .5){
      const lab = n.label.length > 26 ? n.label.slice(0,25)+"…" : n.label;
      ctx.font = `${n.type==="newsletter" ? "600 " : ""}${Math.max(10, 11*Math.min(cam.s,1))}px "Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif`;
      ctx.textAlign = "center"; ctx.textBaseline = "top";
      ctx.fillStyle = n.type==="newsletter" ? inkC : subC;
      ctx.fillText(lab, x, y + r + 4);
    }
  }
  ctx.globalAlpha = 1;
}

/* ---------- animation loop ---------- */
function loop(){
  if (alpha > .015){ tick(); draw(); }
  requestAnimationFrame(loop);
}
if (reduced){
  for (let i=0;i<400;i++) tick();   /* 모션 최소화: 사전 수렴 후 정적 표시 */
  alpha = 0;
}

/* ---------- interaction ---------- */
const tip = document.getElementById("tip");
function pick(px,py){
  const [wx,wy] = toWorld(px,py);
  let best = null, bd = Infinity;
  for (const n of nodes){
    const hit = Math.max(radius(n), 14/cam.s);
    const d = Math.hypot(n.x-wx, n.y-wy);
    if (d < hit && d < bd){ best = n; bd = d; }
  }
  return best;
}
let ptrs = new Map(), dragN = null, panning = false, moved = false, pinch0 = 0, scale0 = 1;
cv.addEventListener("pointerdown", ev => {
  cv.setPointerCapture(ev.pointerId);
  ptrs.set(ev.pointerId, {x:ev.offsetX, y:ev.offsetY});
  moved = false;
  if (ptrs.size === 1){
    dragN = pick(ev.offsetX, ev.offsetY);
    if (dragN){ dragN.fixed = true; }
    else panning = true;
    cv.classList.add("dragging");
  } else if (ptrs.size === 2){
    dragN && (dragN.fixed = false); dragN = null; panning = false;
    const [a,b] = [...ptrs.values()];
    pinch0 = Math.hypot(a.x-b.x, a.y-b.y); scale0 = cam.s;
  }
});
cv.addEventListener("pointermove", ev => {
  if (!ptrs.has(ev.pointerId)){                    /* hover */
    const n = pick(ev.offsetX, ev.offsetY);
    if (n !== hoverN){ hoverN = n; draw(); }
    if (n){
      tip.innerHTML = `<div class="tt"></div><div class="tm"></div>`;
      tip.querySelector(".tt").textContent = n.label;
      tip.querySelector(".tm").textContent = TYPE_LABEL[n.type] + (n.date ? " · " + n.date : "");
      tip.style.display = "block";
      const tw = tip.offsetWidth;
      tip.style.left = Math.min(Math.max(ev.offsetX - tw/2, 8), W - tw - 8) + "px";
      tip.style.top = (ev.offsetY - tip.offsetHeight - 14) + "px";
      cv.style.cursor = "pointer";
    } else { tip.style.display = "none"; cv.style.cursor = "grab"; }
    return;
  }
  const p = ptrs.get(ev.pointerId);
  const dx = ev.offsetX - p.x, dy = ev.offsetY - p.y;
  if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
  if (ptrs.size === 2){
    p.x = ev.offsetX; p.y = ev.offsetY;
    const [a,b] = [...ptrs.values()];
    const d = Math.hypot(a.x-b.x, a.y-b.y);
    if (pinch0 > 0){ cam.s = Math.min(Math.max(scale0 * d/pinch0, .2), 3); draw(); }
    return;
  }
  if (dragN){
    const [wx,wy] = toWorld(ev.offsetX, ev.offsetY);
    dragN.x = wx; dragN.y = wy; dragN.vx = dragN.vy = 0;
    if (!reduced) reheat(.3);
    draw();
  } else if (panning){
    cam.x -= dx/cam.s; cam.y -= dy/cam.s; draw();
  }
  p.x = ev.offsetX; p.y = ev.offsetY;
});
function endPtr(ev){
  ptrs.delete(ev.pointerId);
  cv.classList.remove("dragging");
  if (dragN){ dragN.fixed = false; if(!reduced) reheat(.25); }
  if (!moved && ptrs.size === 0){
    const n = pick(ev.offsetX, ev.offsetY);
    select(n);
  }
  dragN = null; panning = false;
  draw();
}
cv.addEventListener("pointerup", endPtr);
cv.addEventListener("pointercancel", endPtr);
cv.addEventListener("pointerleave", () => { if(!ptrs.size){ hoverN=null; tip.style.display="none"; draw(); } });
cv.addEventListener("wheel", ev => {
  ev.preventDefault();
  const k = ev.deltaY < 0 ? 1.12 : 1/1.12;
  const [wx,wy] = toWorld(ev.offsetX, ev.offsetY);
  cam.s = Math.min(Math.max(cam.s*k, .2), 3);
  const [nx,ny] = toWorld(ev.offsetX, ev.offsetY);
  cam.x += wx-nx; cam.y += wy-ny;
  draw();
}, {passive:false});

/* ---------- selection panel ---------- */
const panel = document.getElementById("panel");
function select(n){
  selN = n;
  if (!n){ panel.classList.remove("open"); draw(); return; }
  const cat = n.category ? `<span class="cat">${CAT_LABEL[n.category] || n.category}</span>` : "";
  const linkWord = n.type==="newsletter" ? "문서 열기" : n.type==="youtube" ? "영상 열기" : "게시물 열기";
  const others = [...nbr.get(n.id)].map(id => byId.get(id))
    .sort((a,b) => (a.date||"").localeCompare(b.date||""));
  const list = others.length
    ? `<ul>${others.map(o => `<li><button data-id="${o.id}">${iconHTML(o.type)}<span>${esc(o.label)}</span></button></li>`).join("")}</ul>`
    : `<p class="none">연결된 항목이 아직 없습니다.</p>`;
  panel.innerHTML = `
    <button class="close" aria-label="닫기">✕</button>
    <span class="ptype ${n.type}">${iconHTML(n.type)}${TYPE_LABEL[n.type]}</span>
    <h2>${esc(n.label)}</h2>
    <div class="meta">${n.date || ""}${n.channel ? " · " + esc(n.channel) : ""}${cat}</div>
    <a class="open-link" href="${n.url}" target="_blank" rel="noopener">${linkWord} →</a>
    <h3>연결 ${others.length}건</h3>${list}`;
  panel.classList.add("open");
  panel.querySelector(".close").onclick = () => select(null);
  panel.querySelectorAll("li button").forEach(b => b.onclick = () => {
    const t = byId.get(b.dataset.id);
    select(t);
    cam.x = t.x; cam.y = t.y;   /* 이웃으로 카메라 이동 */
    draw();
  });
  draw();
}
function esc(s){ const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
addEventListener("keydown", ev => { if (ev.key === "Escape" && selN) select(null); });

/* ---------- legend & filter tabs ---------- */
const counts = { newsletter:0, linkedin:0, youtube:0 };
for (const n of nodes) counts[n.type]++;
function renderLegend(){
  document.getElementById("legend").innerHTML =
    ["newsletter","linkedin","youtube"].map(t =>
      `<span class="lg">${iconHTML(t)}${TYPE_LABEL[t]} <span class="cnt">${counts[t]}</span></span>`
    ).join("") + `<span class="lg lg-edge">연결 <span class="cnt">${edges.length}</span>건</span>`;
}
const tabsEl = document.getElementById("tabs");
function renderTabs(){
  const catN = Object.fromEntries(CATS.map(([k]) => [k, nodes.filter(n => n.type==="newsletter" && n.category===k).length]));
  tabsEl.innerHTML = `<button class="tab${!activeCat?" on":""}" data-cat="">전체</button>` +
    CATS.filter(([k]) => catN[k]).map(([k,l]) =>
      `<button class="tab${activeCat===k?" on":""}" data-cat="${k}">${l} ${catN[k]}</button>`).join("");
  tabsEl.querySelectorAll(".tab").forEach(b => b.onclick = () => {
    activeCat = b.dataset.cat || null;
    renderTabs(); draw();
  });
}

/* ---------- theme reactivity ---------- */
function onTheme(){ buildIcons(); renderLegend(); if (selN) select(selN); setTimeout(draw, 60); }
new MutationObserver(onTheme).observe(document.documentElement, {attributes:true, attributeFilter:["data-theme"]});
matchMedia("(prefers-color-scheme: dark)").addEventListener("change", onTheme);

/* ---------- boot ---------- */
buildIcons();
renderLegend();
renderTabs();
new ResizeObserver(resize).observe(stage);
resize();
let imgsLoaded = 0;
Object.values(iconImg).forEach(im => im.onload = () => { if(++imgsLoaded >= 3) draw(); });
if (!reduced) requestAnimationFrame(loop); else draw();
setTimeout(() => { const h = document.getElementById("hint"); if (h) h.style.opacity = "0"; }, 6000);
</script>
